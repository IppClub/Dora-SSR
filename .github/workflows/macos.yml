name: macOS

on:
  push:
    branches: [ main ]
    tags: 'v*.*.*'
    paths:
      # Shared engine code — triggers all platforms
      - 'Source/**'
      - 'Tools/tolua\+\+/**'
      - 'Tools/build-scripts/**'
      - 'Tools/dora-rust/**'
      # Platform-specific code
      - 'Projects/macOS/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Source/**'
      - 'Tools/tolua\+\+/**'
      - 'Tools/build-scripts/**'
      - 'Tools/dora-rust/**'
      - 'Projects/macOS/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    if: "startsWith(github.ref, 'refs/tags/') || (!contains(github.event.head_commit.message, '[skip CI]') && !contains(github.event.head_commit.message, '[skip macOS]'))"
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'
      - uses: dtolnay/rust-toolchain@stable
      - name: macOS build
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          Tools/tolua++/build.sh
          Tools/build-scripts/build_macos.sh debug
      - name: Generate tutorial docs
        if: startsWith(github.ref, 'refs/tags/')
        run: node Docs/scripts/generate-language-docs.js
      - name: Pack
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          corepack enable
          cd Tools/dora-dora && pnpm install && pnpm build && cd ../..
          cd Assets/www && zip -vr ../../web-ide-files.zip . && cd ../..
          cd $GITHUB_WORKSPACE
          cp Tools/dora-wa/wa.mod Assets/dora-wa
          cp -r Tools/dora-wa/vendor Assets/dora-wa
          Tools/tolua++/build.sh
          Tools/build-scripts/build_macos.sh release
          cd Projects/macOS/build/Release/dora.xcarchive/Products/Applications
          zip -vr Dora.zip Dora.app
          mv Dora.zip $GITHUB_WORKSPACE/dora-ssr-${{ github.ref_name }}-macos-universal.zip
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dora-ssr-${{ github.ref_name }}-macos-universal.zip
            web-ide-files.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
