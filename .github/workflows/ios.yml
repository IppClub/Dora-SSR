name: iOS

on:
  push:
    branches: [ main ]
    # Skip CI for changes that don't affect native builds
    paths-ignore: &ios-paths-ignore
      # Non-native changes — never trigger OS builds
      - 'Docs/**'
      - 'Tools/dora-dora/**'
      - 'Assets/**'
      - '**.md'
      - '**.txt'
      - '.claude/**'
      - '.gitattributes'
      - '.github/**'
      - '.gitignore'
      # Other platforms — only trigger when their own code changes
      - 'Projects/Android/**'
      - 'Projects/Linux/**'
      - 'Projects/macOS/**'
      - 'Projects/Windows/**'
  pull_request:
    branches: [ main ]
    paths-ignore: *ios-paths-ignore
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    if: "!contains(github.event.head_commit.message, '[skip CI]') && !contains(github.event.head_commit.message, '[skip iOS]')"
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build bgfx libraries
        run: Tools/build-scripts/build_lib_bgfx.sh ios
      - name: iOS build
        run: |
          Tools/tolua++/build.sh
          cd Source/Rust
          rustup target add aarch64-apple-ios-sim
          cargo build --target aarch64-apple-ios-sim
          cp target/aarch64-apple-ios-sim/debug/libdora_runtime.a lib/iOS-Simulator/libdora_runtime.a
          xcodebuild ARCHS=arm64 ONLY_ACTIVE_ARCH=NO -project ../../Projects/iOS/Dora.xcodeproj -configuration Debug -target Simulator -sdk iphonesimulator
