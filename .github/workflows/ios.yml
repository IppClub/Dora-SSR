name: iOS

on:
  push:
    branches: [ main ]
    paths:
      # Shared engine code — triggers all platforms
      - 'Source/**'
      - 'Tools/tolua\+\+/**'
      - 'Tools/build-scripts/**'
      - 'Tools/dora-rust/**'
      # Platform-specific code
      - 'Projects/iOS/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Source/**'
      - 'Tools/tolua\+\+/**'
      - 'Tools/build-scripts/**'
      - 'Tools/dora-rust/**'
      - 'Projects/iOS/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    if: "!contains(github.event.head_commit.message, '[skip CI]') && !contains(github.event.head_commit.message, '[skip iOS]')"
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: iOS build
        run: |
          Tools/tolua++/build.sh
          Tools/build-scripts/build_ios.sh debug
