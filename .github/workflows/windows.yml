name: Windows

on:
  push:
    branches: [ main ]
    tags: 'v*.*.*'
    paths:
      # Shared engine code — triggers all platforms
      - 'Source/**'
      - 'Tools/tolua\+\+/**'
      - 'Tools/build-scripts/**'
      - 'Tools/dora-rust/**'
      # Platform-specific code
      - 'Projects/Windows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Source/**'
      - 'Tools/tolua\+\+/**'
      - 'Tools/build-scripts/**'
      - 'Tools/dora-rust/**'
      - 'Projects/Windows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026    
    if: "startsWith(github.ref, 'refs/tags/') || (!contains(github.event.head_commit.message, '[skip CI]') && !contains(github.event.head_commit.message, '[skip Windows]'))"
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v1.0.2
      - name: Windows build
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: Tools\build-scripts\build_windows.bat debug
      - name: Windows release build
        if: startsWith(github.ref, 'refs/tags/')
        run: Tools\build-scripts\build_windows.bat release
      - name: Generate tutorial docs
        if: startsWith(github.ref, 'refs/tags/')
        run: node Docs/scripts/generate-language-docs.js
      - name: Pack
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          corepack enable
          cd Tools\dora-dora
          pnpm install
          pnpm build
          ren build www
          7z a -tzip ..\..\dora-ssr-windows-x86.zip www
          cd ..\..
          xcopy Tools\dora-wa\wa.mod Assets\dora-wa\ /I /Y
          xcopy Tools\dora-wa\vendor Assets\dora-wa\vendor /I /E /Y
          (cd Assets && 7z a -tzip ..\dora-ssr-windows-x86.zip dora-wa && cd ..)
          (cd Assets && 7z a -tzip ..\dora-ssr-windows-x86.zip Doc && cd ..)
          (cd Assets && 7z a -tzip ..\dora-ssr-windows-x86.zip Font && cd ..)
          (cd Assets && 7z a -tzip ..\dora-ssr-windows-x86.zip Image && cd ..)
          (cd Assets && 7z a -tzip ..\dora-ssr-windows-x86.zip gamecontrollerdb.txt && cd ..)
          (cd Assets && 7z a -tzip ..\dora-ssr-windows-x86.zip LICENSES && cd ..)
          (cd Assets && 7z a -tzip ..\dora-ssr-windows-x86.zip Script && cd ..)
          Push-Location Projects\Windows\build\Release
          if (!(Test-Path Dora.exe)) { throw "Dora.exe was not produced by the Windows build" }
          if (!(Test-Path wa.dll)) { throw "wa.dll was not copied by the Windows build" }
          7z a -tzip ..\..\..\..\dora-ssr-windows-x86.zip Dora.exe
          7z a -tzip ..\..\..\..\dora-ssr-windows-x86.zip wa.dll
          Pop-Location
          ren dora-ssr-windows-x86.zip dora-ssr-${{ github.ref_name }}-windows-x86.zip
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dora-ssr-${{ github.ref_name }}-windows-x86.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
