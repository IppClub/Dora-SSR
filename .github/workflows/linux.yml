name: Linux

on:
  push:
    branches: [ main ]
    # Skip CI for changes that don't affect native builds
    paths-ignore: &linux-paths-ignore
      # Non-native changes — never trigger OS builds
      - 'Docs/**'
      - 'Tools/dora-dora/**'
      - 'Assets/**'
      - '**.md'
      - '**.txt'
      - '.claude/**'
      - '.gitattributes'
      - '.gitignore'
      # Other platforms — only trigger when their own code changes
      - 'Projects/Android/**'
      - 'Projects/iOS/**'
      - 'Projects/macOS/**'
      - 'Projects/Windows/**'
  pull_request:
    branches: [ main ]
    paths-ignore: *linux-paths-ignore
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip CI]') && !contains(github.event.head_commit.message, '[skip Linux]')"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libgl1-mesa-dev libssl-dev libx11-dev
    - name: Generate Lua bindings
      run: |
        sudo apt-get install lua5.1
        sudo apt-get install -y luarocks
        sudo luarocks install luafilesystem
        cd ./Tools/tolua++
        lua tolua++.lua
    - uses: dtolnay/rust-toolchain@stable
    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: v2.9.4
    - name: Build bgfx with xmake
      run: |
        cd Source/3rdParty/bgfx
        xmake f -p linux -a x86_64 -m release -y
        xmake -v
    - name: Make
      run: |
        cd Projects/Linux
        make x86_64
