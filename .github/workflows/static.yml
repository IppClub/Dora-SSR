# Build and deploy the Docusaurus documentation site to GitHub Pages.
# PRs only run the build to verify the site compiles; deployment happens
# automatically on push to main, or manually via workflow_dispatch.
name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'Docs/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Docs/**'
  workflow_dispatch:

# Only allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Always build — serves as CI check on PRs, and feeds the deploy job.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build docs
        run: |
          corepack enable
          cd Docs
          pnpm install --frozen-lockfile
          pnpm build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Docs/build'

  # Only deploy on push to main or manual dispatch (skip pull_request).
  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
